version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 10.0
    commands:
      - echo Checking internet connectivity
      - curl -I https://www.google.com

      - echo Installing Chrome
      - yum install -y wget unzip
      - wget https://dl.google.com/linux/direct/google-chrome-stable_current_x86_64.rpm
      - yum install -y ./google-chrome-stable_current_x86_64.rpm
      - google-chrome --version

  pre_build:
    commands:
      - echo Restoring packages
      - dotnet restore ATF/TestAutomationSpecFlow.sln

  build:
    commands:
      - echo Building solution
      - dotnet build ATF/TestAutomationSpecFlow.sln --configuration Release --no-restore

  post_build:
    commands:
      - export RUN_TS=$(date +%Y%m%d-%H%M%S)
      - export RUN_LABEL="${TEST_CATEGORY:-All}-$RUN_TS"
      - echo Build run label: $RUN_LABEL
      - echo Running filtered tests for category $TEST_CATEGORY
      - dotnet test ATF/TestAutomationSpecFlow.sln --configuration Release --no-build --filter "TestCategory=$TEST_CATEGORY" --logger "trx;LogFileName=$RUN_LABEL.trx" --results-directory ATF/TestResults

reports:
  test-reports:
    files:
      - '**/*.trx'
    base-directory: ATF/TestResults
    file-format: VISUALSTUDIOTRX

artifacts:
  name: TestResults-$TEST_CATEGORY-$(date +%Y%m%d-%H%M%S)
  files:
    - '**/*'
  base-directory: ATF/TestResults
  discard-paths: no
  packaging: ZIP